name: SLSA Provenance
on:
  workflow_dispatch:
  release:
    types:
    - created
permissions:
  id-token: write
  contents: read
  actions: read
env:
  NET_MATRIX_ORGANIZATION: daplanet
  NET_MATRIX_ORGUNIT: dps
  NET_MATRIX_OWNER: FC13F74B@matrix.net
  NET_MATRIX_CUSTOMER: PVT-01
  NET_MATRIX_COSTCENTER: INT-01
  NET_MATRIX_OID: iso.org.dod.internet.42387
  NET_MATRIX_DUNS: iso.org.duns.039271257
  NET_MATRIX_APPLICATION: thelounge-plugin-webcal
  NET_MATRIX_ROLE: thelounge-plugin
  NET_MATRIX_ENVIRONMENT: production
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: npm ci
    - name: Build release tarball
      run: "mkdir -p dist\ntar czf dist/thelounge-plugin-webcal-${{ github.ref_name
        }}.tar.gz --exclude='.git' --exclude='dist' --exclude='node_modules' ."
    - name: Hash with openssl
      id: hash
      run: "openssl dgst -sha256 -hex dist/*.tar.gz | awk '{print $2}' > dist/release.sha256\n\
        echo \"hashes=$(base64 -w0 dist/release.sha256)\" >> \"$GITHUB_OUTPUT\""
    - uses: actions/upload-artifact@v4
      with:
        name: thelounge-plugin-webcal-release
        path: dist/
  provenance:
    needs:
    - build
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: 
      slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true
      provenance-name: thelounge-plugin-webcal.intoto.jsonl
  verify:
    needs:
    - build
    - provenance
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        name: thelounge-plugin-webcal-release
        path: dist/
    - name: Download provenance
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release download "${{ github.ref_name }}" --pattern 
        "thelounge-plugin-webcal.intoto.jsonl" --repo "${{ github.repository }}"
    - name: Install slsa-verifier + OPA
      run: "curl -sSfL https://github.com/slsa-framework/slsa-verifier/releases/latest/download/slsa-verifier-linux-amd64
        -o slsa-verifier && chmod +x slsa-verifier\ncurl -sSfL https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
        -o opa && chmod +x opa"
    - name: Verify provenance + Rego gate
      id: verify
      run: "./slsa-verifier verify-artifact dist/*.tar.gz --provenance-path thelounge-plugin-webcal.intoto.jsonl
        --source-uri \"github.com/${{ github.repository }}\" --source-tag \"${{ github.ref_name
        }}\"\necho \"exit_code=$?\" >> \"$GITHUB_OUTPUT\"\necho \"{\\\"slsa_verifier_exit_code\\\
        \": ${{ steps.verify.outputs.exit_code }},\\\"event_name\\\": \\\"${{ github.event_name
        }}\\\",\\\"ref\\\": \\\"${{ github.ref }}\\\",\\\"slsa_provenance_attached\\\
        \": true,\\\"provenance_workflow_triggered\\\": true}\" > slsa_input.json\n\
        ./opa eval -d policy/slsa.rego -i slsa_input.json --fail-defined 'data.thelounge_plugin_webcal.slsa.deny[_]'
        && echo \"slsa gate: PASS\""
